name: repeatexplorer
channels:
  - iuc
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core language/runtime – align with known-good repeatexplorer stack
  - python=3.7.*

  # RepeatExplorer / TAREAN runtime stack (mirrors install_reportr.py minimal_env)
  - blast
  - mafft
  - diamond
  - imagemagick=7.0.11_12
  - libxml2=2.9.10
  - r-base=4.0.3
  - r-igraph
  - r-data.tree
  - r-stringr
  - r-r2html
  - r-hwriter
  - r-dt
  - r-scales
  - r-plotrix
  - r-png
  - r-plyr
  - r-dplyr
  - r-optparse
  - r-dbi
  - r-rsqlite
  - r-rserve
  - bioconductor-biostrings

  # Additional tools that install_reportr.py pulls into repeatexplorer
  - numpy<2   # pyRserve uses np.string_/np.str_ removed in NumPy 2.0
  - pyrserve=0.9.1
  - last>=956
  - blast-legacy
  - compilers

  # Read cleaning / preparation tools shared with RepOrtR
  - bbmap>=38.0        # provides bbduk.sh and reformat.sh
  - fastqc>=0.11.9

